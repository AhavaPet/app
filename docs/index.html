<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    let backend = params.get("backend");

    let API_BASE_URL = "http://localhost:8080";

    if (backend) {
      // avoid double https
      if (!backend.includes("://")) {
        backend = "https://" + backend;
      }

      localStorage.setItem("backend", backend);
      console.log("Saved backend:", backend);
    } else {
      // only set default if nothing stored already
      if (!localStorage.getItem("backend")) {
        localStorage.setItem("backend", API_BASE_URL);
        console.log("Saved default backend:", API_BASE_URL);
      } else {
        console.log("Using existing backend:", localStorage.getItem("backend"));
      }
    }
  })();
</script>

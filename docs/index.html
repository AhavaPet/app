<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/app/paw.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00BFA5" />
  <meta name="description" content="AhavaPet - Multi-tenant Pet Management SaaS" />
<script>
  (function () {
    let search = window.location.search;

    // handle hash routing (?backend inside #)
    if (!search && window.location.hash.includes("?")) {
      search = "?" + window.location.hash.split("?")[1];
    }

    const params = new URLSearchParams(search);
    let backend = params.get("backend");

    // 🔥 ALWAYS persist when present
    if (backend) {
      console.log("Saving backend:", backend);
      localStorage.setItem("backend", backend);
    }

    // 🔥 ALWAYS restore if missing
    if (!backend) {
      backend = localStorage.getItem("backend");
      console.log("Restored backend:", backend);
    }

    let API_BASE_URL = "http://localhost:8080";

    if (backend) {
      if (backend === "local") {
        API_BASE_URL = "http://localhost:8080";
      } else if (backend.includes("://")) {
        API_BASE_URL = backend;
      } else {
        API_BASE_URL = "https://" + backend;
      }
    }

    window.__CONFIG__ = { API_BASE_URL };

    console.log("FINAL CONFIG:", window.__CONFIG__);
  })();
</script>
  <title>AhavaPet - Pet Management</title>
